    <!-- Body -->
    <rect x="12" y="36" width="48" height="32" fill="#28abe2"/>
    <!-- Door -->
    <rect x="28" y="48" width="16" height="20" fill="white" opacity="0.9"/>
    <!-- Chimney -->
