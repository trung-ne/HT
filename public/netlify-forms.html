<!DOCTYPE html>
<html>
  <head><title>Netlify Form Detection</title></head>
  <body>
    <!-- This file exists solely for Netlify's form bot to detect the form at build time. -->
    <form name="consultation" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="consultation" />
      <input name="bot-field" />
      <input name="lang" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="budget" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
